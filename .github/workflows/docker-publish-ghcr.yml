name: Build and publish to GHCR
on:
  push:
    branches: [ main ]
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: read
  packages: write

concurrency:
  # 如果你不想取消旧的运行，把 cancel-in-progress 设为 false
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    env:
      IMAGE_NAME: maven-dev
      TAG_DEV1: dev1

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare metadata (lowercase owner, short sha)
        run: |
          echo "OWNER_LOWER=$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV
          echo "SHORT_SHA=${GITHUB_SHA::7}" >> $GITHUB_ENV

      - name: Set up QEMU (for multi-arch emulation)
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
        with:
          # 'install' 是不被某些版本接受的无效输入 —— 已移除
          driver: docker-container
          # 如需额外驱动选项，可加 driver-opts，例如：
          # driver-opts: image=moby/buildkit:latest

      - name: Login to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_TOKEN || secrets.GITHUB_TOKEN }}

      - name: Build and push (dev1)
        uses: docker/build-push-action@v4
        with:
          context: ./
          file: ./Dockerfile
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            ghcr.io/${{ env.OWNER_LOWER }}/${{ env.IMAGE_NAME }}:${{ env.TAG_DEV1 }}

      - name: Post-check (log pushed tags)
        run: |
          echo "pushed tags:"
          echo "  ghcr.io/${OWNER_LOWER}/${IMAGE_NAME}:${TAG_DEV1}"
